<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nathal.IA — preview de animações 2D</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; background:#faf7f2; color:#1a1a1a; }
  h1 { font-size: 20px; }
  p.note { color:#555; max-width: 60ch; }
  .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap:16px; margin-top:16px; }
  .card { margin:0; border:2px solid #1a1a1a; border-radius:14px; background:#fff; padding:12px; box-shadow:4px 4px 0 0 #1a1a1a; }
  .stage { display:grid; place-items:center; height:140px; }
  .face { width:128px; height:128px; object-fit:cover; border-radius:50%; transform-origin:50% 80%; }
  figcaption { text-align:center; font-weight:700; margin-top:8px; }
  figcaption small { display:block; font-weight:500; color:#777; }
  .toolbar { margin-top:12px; }
  button { border:2px solid #1a1a1a; background:#ffd34d; border-radius:10px; padding:6px 12px; font-weight:700; cursor:pointer; }
  .dark body, body.dark { background:#1a1a1a; color:#faf7f2; }
  @keyframes calm { 0%,100%{transform:translateY(0) rotate(-1.1deg);} 50%{transform:translateY(-3px) rotate(1.1deg);} }
  @keyframes talk { 0%,100%{transform:translateY(0) rotate(-0.25deg);} 50%{transform:translateY(-2px) rotate(0.25deg);} }
  @keyframes attentive { 0%,100%{transform:translateY(0) rotate(-2deg);} 50%{transform:translateY(-4px) rotate(2deg);} }
  @keyframes emphatic { 0%,100%{transform:translateY(0) rotate(-3deg) scale(1);} 50%{transform:translateY(-7px) rotate(3deg) scale(1.04);} }
  .m-calm { animation: calm 6s ease-in-out infinite; }
  .m-talk { animation: talk 1.4s ease-in-out infinite; }
  .m-attentive { animation: attentive 2.2s ease-in-out infinite; }
  .m-emphatic { animation: emphatic 1.1s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) { .face { animation: none !important; } }
</style></head>
<body>
  <h1>Nathal.IA — preview de animações 2D (10 estados)</h1>
  <p class="note">Gerado por <code>scripts/nathalia/2d/preview_animations.py</code>.
  Offline: abra direto no navegador. Reproduz o motion do <code>Nathalia2DAvatar</code>
  (breathe/sway por perfil) e o lip-sync do estado <b>talking</b> (troca de visema).</p>
  <div class="toolbar"><button onclick="document.body.classList.toggle('dark')">alternar fundo</button></div>
  <div class="grid"><figure class="card"><div class="stage"><img class="face m-calm" data-talking="false" src="../layers/face/expressions/animada.webp" alt="idle"></div><figcaption>idle<small>animada</small></figcaption></figure><figure class="card"><div class="stage"><img class="face m-calm" data-talking="false" src="../layers/face/expressions/animada.webp" alt="idle_blink"></div><figcaption>idle_blink<small>animada</small></figcaption></figure><figure class="card"><div class="stage"><img class="face m-attentive" data-talking="false" src="../layers/face/expressions/curiosa.webp" alt="listening"></div><figcaption>listening<small>curiosa</small></figcaption></figure><figure class="card"><div class="stage"><img class="face m-talk" data-talking="true" src="../layers/face/expressions/animada.webp" alt="talking"></div><figcaption>talking<small>animada</small></figcaption></figure><figure class="card"><div class="stage"><img class="face m-calm" data-talking="false" src="../layers/face/expressions/pensativa.webp" alt="thinking"></div><figcaption>thinking<small>pensativa</small></figcaption></figure><figure class="card"><div class="stage"><img class="face m-emphatic" data-talking="false" src="../layers/face/expressions/empolgada.webp" alt="success"></div><figcaption>success<small>empolgada</small></figcaption></figure><figure class="card"><div class="stage"><img class="face m-attentive" data-talking="false" src="../layers/face/expressions/encorajando.webp" alt="error"></div><figcaption>error<small>encorajando</small></figcaption></figure><figure class="card"><div class="stage"><img class="face m-attentive" data-talking="false" src="../layers/face/expressions/alerta.webp" alt="alert"></div><figcaption>alert<small>alerta</small></figcaption></figure><figure class="card"><div class="stage"><img class="face m-emphatic" data-talking="false" src="../layers/face/expressions/comemorando.webp" alt="celebrate"></div><figcaption>celebrate<small>comemorando</small></figcaption></figure><figure class="card"><div class="stage"><img class="face m-emphatic" data-talking="false" src="../layers/face/expressions/animada.webp" alt="wave"></div><figcaption>wave<small>animada</small></figcaption></figure></div>
  <script>
    const visemes = ["../layers/face/visemes/vis-rest.webp", "../layers/face/visemes/vis-a.webp", "../layers/face/visemes/vis-e.webp", "../layers/face/visemes/vis-o.webp", "../layers/face/visemes/vis-m.webp", "../layers/face/visemes/vis-i.webp", "../layers/face/visemes/vis-u.webp", "../layers/face/visemes/vis-s.webp", "../layers/face/visemes/vis-a.webp", "../layers/face/visemes/vis-o.webp", "../layers/face/visemes/vis-e.webp", "../layers/face/visemes/vis-rest.webp", "../layers/face/visemes/vis-tdn.webp", "../layers/face/visemes/vis-a.webp", "../layers/face/visemes/vis-rest.webp"];
    const talkers = [...document.querySelectorAll('.face[data-talking="true"]')];
    if (visemes.length && talkers.length) {
      let i = 0;
      setInterval(() => {
        i = (i + 1) % visemes.length;
        talkers.forEach(img => { img.src = visemes[i]; });
      }, 135);
    }
  </script>
</body></html>
